services:
  postgres_users:
    image: postgres:15
    environment:
      POSTGRES_USER: htrace
      POSTGRES_PASSWORD: htrace_secret
      POSTGRES_DB: users
    volumes:
      - pg_users_data:/var/lib/postgresql/data
    networks:
      - htrace

  postgres_threats:
    image: postgres:15
    environment:
      POSTGRES_USER: htrace
      POSTGRES_PASSWORD: htrace_secret
      POSTGRES_DB: threats
    volumes:
      - pg_threats_data:/var/lib/postgresql/data
    networks:
      - htrace

  elasticsearch:
    image: elasticsearch:8.11.0
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
    volumes:
      - es_data:/usr/share/elasticsearch/data
    networks:
      - htrace

  redis:
    image: redis:7
    networks:
      - htrace

  auth_service:
    build: ./backend/auth_service
    command: uvicorn app.main:app --host 0.0.0.0 --port 8001
    networks:
      - htrace

  threat_intel_service:
    build: ./backend/threat_intel_service
    command: uvicorn app.main:app --host 0.0.0.0 --port 8002
    environment:
      DATABASE_URL: postgresql://htrace:htrace_secret@postgres_threats/threats
      ELASTICSEARCH_URL: http://elasticsearch:9200
    ports:
      - "8002:8002"
    depends_on:
      - postgres_threats
      - elasticsearch
    networks:
      - htrace
  source_connector_service:
    build: ./backend/source_connector_service
    command: uvicorn app.main:app --host 0.0.0.0 --port 8003
    environment:
      THREAT_SOURCES: '{"openioc":"https://openioc.example.com/api","phishtank":"https://phishtank.example.com/api"}'
      THREAT_INTEL_SERVICE_URL: http://threat_intel_service:8002
      REDIS_URL: redis://redis:6379
    ports:
      - "8003:8003"
    depends_on:
      - threat_intel_service
      - redis
    networks:
      - htrace

  api_gateway:
    build: ./backend/api_gateway
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    environment:
      AUTH_SERVICE_URL: http://auth_service:8001
      THREAT_INTEL_SERVICE_URL: http://threat_intel_service:8002
      SOURCE_CONNECTOR_SERVICE_URL: http://source_connector_service:8003
      SECRET_KEY: change_me_to_a_random_string
      REDIS_URL: redis://redis:6379
    ports:
      - "8000:8000"
    depends_on:
      - auth_service
      - threat_intel_service
      - source_connector_service
      - redis
    networks:
      - htrace
      
  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - api_gateway
    networks:
      - htrace


networks:
  htrace:

volumes:
  pg_users_data:
  pg_threats_data:
  es_data:
