name: H-Trace CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  backend-lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [auth_service, threat_intel_service, api_gateway, source_connector_service]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        working-directory: backend/${{ matrix.service }}
        run: |
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi
          pip install flake8 pytest

      - name: Lint with flake8
        working-directory: backend/${{ matrix.service }}
        run: flake8 app/ --count --max-complexity=10 --statistics

      - name: Run tests (if any)
        working-directory: backend/${{ matrix.service }}
        run: |
          if [ -d tests ]; then
            pytest tests/
          else
            echo "No tests directory found, skipping."
          fi

  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Run lint (if configured)
        run: |
          if grep -q '"lint"' package.json; then
            npm run lint
          else
            echo "No lint script found, skipping."
          fi

  docker-build:
    runs-on: ubuntu-latest
    # This step is optional but ensures Dockerfiles are valid
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker images
        run: docker compose build
